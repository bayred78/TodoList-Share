name: TodoList-Share QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qa-web-test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스 코드 체크아웃
      uses: actions/checkout@v3

    - name: 2. Node.js 환경 설정
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 3. 패키지 모듈 및 의존성 설치
      run: npm install

    - name: 4. [1단계] 코어 로직 Unit Test 실행 (Vitest)
      run: npm run test

    # ---------------------------------------------------------
    # [2단계: 안드로이드 APK 빌드 무결성 자동 검증]
    # ---------------------------------------------------------
    - name: 5. [2단계] 웹 프로덕션 빌드 (Vite)
      run: npm run build
    
    - name: 6. [2단계] Capacitor 안드로이드 동기화
      run: npx cap sync android

    - name: 7. [2단계] Java 환경 설정 (APK 빌드용)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 7.5 [2단계] Gradle 실행 권한 강제 부여 (Windows -> Linux 권한 오류 방지)
      working-directory: ./android
      run: chmod +x ./gradlew

    - name: 8. [2단계] 안드로이드 APK 빌드
      working-directory: ./android
      run: ./gradlew assembleDebug

